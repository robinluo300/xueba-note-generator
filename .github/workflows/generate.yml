name: 生成语文笔记

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "课文名称"
        required: true
        type: string
      url:
        description: "汉查查网页 URL（可选，留空自动搜索）"
        required: false
        type: string
      api_key:
        description: "通义千问 API Key"
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: pip install cloudscraper beautifulsoup4 pyyaml

      - name: 生成笔记
        run: python3 workflow_runner.py "${{ inputs.topic }}" "${{ inputs.url }}" "${{ inputs.api_key }}"

      - name: 提交到仓库
        run: |
          git config user.name "xueba-bot"
          git config user.email "bot@xueba-note-generator"
          git add 笔记/
          git commit -m "生成笔记: ${{ inputs.topic }}"
          git push
